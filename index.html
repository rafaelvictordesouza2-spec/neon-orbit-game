<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#090b1a"><link rel="manifest" href="manifest.json"><title>Neon Orbit</title><style>*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at 50% 20%,#1b1750,#070914 65%);font-family:Inter,system-ui,sans-serif;touch-action:none}#game{width:100%;height:100%}.glass{position:fixed;inset:auto 12px calc(12px + env(safe-area-inset-bottom));z-index:9;display:flex;justify-content:center;pointer-events:none}.hint{padding:9px 14px;border:1px solid #ffffff24;border-radius:999px;background:#0d1022bb;backdrop-filter:blur(12px);color:#dfe7ff;font-size:12px;letter-spacing:.03em;box-shadow:0 8px 28px #0008}canvas{display:block}</style></head><body><div id="game"></div><div class="glass"><div class="hint">Arraste para mover • solte para pulso</div></div><script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script><script>
const SAVE='neon-orbit-v1';const S=Object.assign({coins:0,xp:0,level:1,best:0,skin:0,sound:1,missions:0},JSON.parse(localStorage.getItem(SAVE)||'{}'));const save=()=>localStorage.setItem(SAVE,JSON.stringify(S));
class AudioFX{constructor(){this.ctx=null} init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)()} tone(f=440,d=.07,type='sine',v=.05){if(!S.sound)return;this.init();let o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=type;o.frequency.value=f;g.gain.setValueAtTime(v,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);o.connect(g).connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d)}} const fx=new AudioFX();
class Game extends Phaser.Scene{constructor(){super('g')}create(){this.W=this.scale.width;this.H=this.scale.height;this.cameras.main.setBackgroundColor('#080a18');this.g=this.add.graphics();this.player={x:this.W/2,y:this.H*.68,r:18,hp:100,max:100,lv:1,xp:0,next:12,power:1,speed:1};this.en=[];this.orbs=[];this.shots=[];this.parts=[];this.score=0;this.combo=0;this.multi=1;this.timeAlive=0;this.spawnT=0;this.orbT=0;this.shotT=0;this.dead=false;this.drag=false;this.target={x:this.player.x,y:this.player.y};this.input.on('pointerdown',p=>{fx.init();this.drag=true;this.target={x:p.x,y:p.y}});this.input.on('pointermove',p=>{if(this.drag)this.target={x:p.x,y:p.y}});this.input.on('pointerup',()=>{this.drag=false;this.pulse()});this.ui();this.makeStars();this.scale.on('resize',s=>{this.W=s.width;this.H=s.height});}
makeStars(){this.stars=[];for(let i=0;i<70;i++)this.stars.push({x:Math.random()*this.W,y:Math.random()*this.H,z:Math.random()*2+1})}
ui(){this.title=this.add.text(18,16,'NEON ORBIT',{font:'800 18px system-ui',color:'#fff'}).setDepth(5);this.scoreT=this.add.text(18,42,'0',{font:'700 28px system-ui',color:'#7cf6ff'}).setDepth(5);this.coinT=this.add.text(this.W-18,20,'◆ '+S.coins,{font:'700 16px system-ui',color:'#ffd86b'}).setOrigin(1,0).setDepth(5);this.levelT=this.add.text(this.W/2,20,'NÍVEL '+S.level,{font:'700 13px system-ui',color:'#cdd4ff'}).setOrigin(.5,0).setDepth(5);this.hpBg=this.add.rectangle(this.W/2,this.H-36,Math.min(300,this.W-54),11,0x1b2140,.9).setDepth(5);this.hp=this.add.rectangle(this.W/2,this.H-36,Math.min(300,this.W-54),11,0x51f6a5,1).setDepth(6);this.xpBg=this.add.rectangle(this.W/2,this.H-20,Math.min(300,this.W-54),6,0x1b2140,.9).setDepth(5);this.xpBar=this.add.rectangle(this.W/2,this.H-20,0,6,0x7c5cff,1).setOrigin(0,.5).setDepth(6);}
spawnEnemy(){let side=Phaser.Math.Between(0,3),x,y;if(side==0){x=Math.random()*this.W;y=-30}else if(side==1){x=this.W+30;y=Math.random()*this.H}else if(side==2){x=Math.random()*this.W;y=this.H+30}else{x=-30;y=Math.random()*this.H}let t=Math.random()<.15?2:1;this.en.push({x,y,r:t==2?19:12,hp:t==2?5+this.timeAlive*.05:2+this.timeAlive*.03,max:1,sp:t==2?.42:.7+Math.random()*.25,type:t,hit:0})}
spawnOrb(){this.orbs.push({x:30+Math.random()*(this.W-60),y:80+Math.random()*(this.H-150),r:7,h:Math.random()*360,p:0})}
shoot(){if(!this.en.length)return;let e=this.en.reduce((a,b)=>Phaser.Math.Distance.Between(this.player.x,this.player.y,a.x,a.y)<Phaser.Math.Distance.Between(this.player.x,this.player.y,b.x,b.y)?a:b),ang=Math.atan2(e.y-this.player.y,e.x-this.player.x);this.shots.push({x:this.player.x,y:this.player.y,vx:Math.cos(ang)*8,vy:Math.sin(ang)*8,r:4,life:80});fx.tone(540,.03,'square',.018)}
pulse(){if(this.dead)return;fx.tone(190,.12,'sawtooth',.05);navigator.vibrate?.(18);this.cameras.main.shake(70,.004);for(let i=0;i<24;i++){let a=Math.PI*2*i/24;this.parts.push({x:this.player.x,y:this.player.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4,life:24,c:0x7cf6ff})}for(const e of this.en){let d=Phaser.Math.Distance.Between(this.player.x,this.player.y,e.x,e.y);if(d<105){e.hp-=1+this.player.power*.35;e.x+=(e.x-this.player.x)*.08;e.y+=(e.y-this.player.y)*.08}}}
boom(x,y,c=0xff5ca8){for(let i=0;i<14;i++){let a=Math.random()*Math.PI*2,s=Math.random()*5+1;this.parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*16,c})}}
levelUp(){this.player.lv++;this.player.next=Math.round(this.player.next*1.28);this.player.power+=.35;this.player.r=Math.min(30,this.player.r+1.2);S.xp+=10;while(S.xp>=S.level*50){S.xp-=S.level*50;S.level++;S.coins+=25}save();fx.tone(880,.2,'triangle',.07);navigator.vibrate?.([20,30,30]);this.cameras.main.flash(180,100,220,255);let t=this.add.text(this.W/2,this.H*.38,'LEVEL UP!\nPODER +',{align:'center',font:'900 30px system-ui',color:'#fff',stroke:'#6b4cff',strokeThickness:7}).setOrigin(.5).setDepth(10);this.tweens.add({targets:t,y:t.y-60,alpha:0,scale:1.25,duration:900,onComplete:()=>t.destroy()})}
end(){this.dead=true;S.best=Math.max(S.best,Math.floor(this.score));S.coins+=Math.floor(this.score/70);S.missions++;save();fx.tone(90,.5,'sawtooth',.08);this.cameras.main.shake(400,.018);let p=this.add.rectangle(this.W/2,this.H/2,this.W,this.H,0x050611,.84).setDepth(20);let title=this.add.text(this.W/2,this.H*.31,'FIM DA RUN',{font:'900 34px system-ui',color:'#fff'}).setOrigin(.5).setDepth(21);let stat=this.add.text(this.W/2,this.H*.43,`Pontos  ${Math.floor(this.score)}\nRecorde  ${S.best}\nMoedas  ◆ ${S.coins}`,{align:'center',font:'700 18px system-ui',color:'#bfc9ff',lineSpacing:10}).setOrigin(.5).setDepth(21);let b=this.add.rectangle(this.W/2,this.H*.63,220,58,0x6b4cff,1).setStrokeStyle(2,0xb9aaff).setDepth(21).setInteractive();let bt=this.add.text(this.W/2,this.H*.63,'JOGAR DE NOVO',{font:'800 16px system-ui',color:'#fff'}).setOrigin(.5).setDepth(22);b.on('pointerdown',()=>this.scene.restart())}
update(_,dt){if(this.dead)return;let d=dt/16.67;this.timeAlive+=dt/1000;this.spawnT-=dt;this.orbT-=dt;this.shotT-=dt;if(this.spawnT<0){this.spawnT=Math.max(180,850-this.timeAlive*10);this.spawnEnemy()}if(this.orbT<0){this.orbT=950;this.spawnOrb()}if(this.shotT<0){this.shotT=Math.max(120,420-this.player.lv*12);this.shoot()}let dx=this.target.x-this.player.x,dy=this.target.y-this.player.y,dd=Math.hypot(dx,dy);if(dd>3){this.player.x+=dx*.12*this.player.speed*d;this.player.y+=dy*.12*this.player.speed*d}this.player.x=Phaser.Math.Clamp(this.player.x,20,this.W-20);this.player.y=Phaser.Math.Clamp(this.player.y,70,this.H-55);
for(const s of this.shots){s.x+=s.vx*d;s.y+=s.vy*d;s.life-=d}for(const e of this.en){let a=Math.atan2(this.player.y-e.y,this.player.x-e.x);e.x+=Math.cos(a)*e.sp*d;e.y+=Math.sin(a)*e.sp*d;e.hit=Math.max(0,e.hit-d);if(Phaser.Math.Distance.Between(e.x,e.y,this.player.x,this.player.y)<e.r+this.player.r){this.player.hp-=.35*d*(e.type==2?2:1);e.x-=Math.cos(a)*5;e.y-=Math.sin(a)*5;if(Math.random()<.1)navigator.vibrate?.(8)}}for(const s of this.shots)for(const e of this.en){if(s.life>0&&Phaser.Math.Distance.Between(s.x,s.y,e.x,e.y)<s.r+e.r){let crit=Math.random()<.12,dam=this.player.power*(crit?2:1);e.hp-=dam;s.life=0;e.hit=4;this.combo++;this.multi=1+Math.min(4,Math.floor(this.combo/8))*.25;if(crit){fx.tone(980,.05,'square',.035);this.float(e.x,e.y,'CRIT!', '#fff07a')}}}
for(const o of this.orbs){o.p+=.08*d;if(Phaser.Math.Distance.Between(o.x,o.y,this.player.x,this.player.y)<o.r+this.player.r+5){o.dead=1;this.player.xp++;this.score+=8*this.multi;S.coins+=1;fx.tone(660+this.combo*4,.045,'sine',.04);this.boom(o.x,o.y,0x7cf6ff);this.float(o.x,o.y,'+1', '#7cf6ff');if(this.player.xp>=this.player.next){this.player.xp=0;this.levelUp()}}}for(const e of this.en){if(e.hp<=0&&!e.dead){e.dead=1;this.score+=(e.type==2?30:10)*this.multi;this.boom(e.x,e.y,e.type==2?0xffd86b:0xff5ca8);fx.tone(e.type==2?160:260,.08,'sawtooth',.035)}}for(const p of this.parts){p.x+=p.vx*d;p.y+=p.vy*d;p.vx*=.94;p.vy*=.94;p.life-=d}this.shots=this.shots.filter(x=>x.life>0);this.en=this.en.filter(x=>!x.dead);this.orbs=this.orbs.filter(x=>!x.dead);this.parts=this.parts.filter(x=>x.life>0);if(this.player.hp<=0)this.end();this.score+=dt*.003*this.multi;this.draw();}
float(x,y,txt,col){let t=this.add.text(x,y,txt,{font:'800 13px system-ui',color:col,stroke:'#080a18',strokeThickness:4}).setOrigin(.5).setDepth(9);this.tweens.add({targets:t,y:y-36,alpha:0,duration:550,onComplete:()=>t.destroy()})}
draw(){let g=this.g;g.clear();for(const s of this.stars){s.y+=s.z*.08;if(s.y>this.H)s.y=0;g.fillStyle(0xffffff,.15+s.z*.08);g.fillCircle(s.x,s.y,s.z*.55)}for(const o of this.orbs){g.lineStyle(3,0x7cf6ff,.15);g.strokeCircle(o.x,o.y,11+Math.sin(o.p)*3);g.fillStyle(0x7cf6ff,1);g.fillCircle(o.x,o.y,o.r);g.fillStyle(0xffffff,.8);g.fillCircle(o.x-2,o.y-2,2)}for(const s of this.shots){g.fillStyle(0xb99cff,.22);g.fillCircle(s.x,s.y,10);g.fillStyle(0xffffff,1);g.fillCircle(s.x,s.y,s.r)}for(const e of this.en){g.fillStyle(e.type==2?0xffc857:0xff4f91,.2);g.fillCircle(e.x,e.y,e.r+8);g.fillStyle(e.hit?0xffffff:(e.type==2?0xffc857:0xff4f91),1);g.fillCircle(e.x,e.y,e.r);g.fillStyle(0x080a18,1);g.fillCircle(e.x-4,e.y-2,2);g.fillCircle(e.x+4,e.y-2,2)}for(const p of this.parts){g.fillStyle(p.c,p.life/30);g.fillCircle(p.x,p.y,2.5)}g.fillStyle(0x7c5cff,.2);g.fillCircle(this.player.x,this.player.y,this.player.r+14+Math.sin(this.timeAlive*6)*2);g.fillStyle(0x7cf6ff,.28);g.fillCircle(this.player.x,this.player.y,this.player.r+7);g.fillStyle([0x7cf6ff,0xff70c9,0xffd86b][S.skin%3],1);g.fillCircle(this.player.x,this.player.y,this.player.r);g.fillStyle(0xffffff,.85);g.fillCircle(this.player.x-6,this.player.y-7,5);this.scoreT.setText(Math.floor(this.score));this.coinT.setText('◆ '+S.coins);this.levelT.setText('META NÍVEL '+S.level);let w=Math.min(300,this.W-54);this.hp.setSize(w*Math.max(0,this.player.hp/this.player.max),11).setPosition(this.W/2-w/2+(w*Math.max(0,this.player.hp/this.player.max))/2,this.H-36);this.xpBar.setSize(w*(this.player.xp/this.player.next),6).setPosition(this.W/2-w/2,this.H-20);this.hpBg.setPosition(this.W/2,this.H-36);this.xpBg.setPosition(this.W/2,this.H-20);this.coinT.setPosition(this.W-18,20)}}
new Phaser.Game({type:Phaser.AUTO,parent:'game',backgroundColor:'#080a18',scale:{mode:Phaser.Scale.RESIZE,autoCenter:Phaser.Scale.CENTER_BOTH,width:'100%',height:'100%'},render:{antialias:true,pixelArt:false},scene:[Game],fps:{target:60,forceSetTimeOut:false}});if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('sw.js'));
</script></body></html>
